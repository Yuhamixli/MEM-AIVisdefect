name: Deploy BI

on:
  push:
    branches: [main, master]
    paths:
      - 'apps/bi/**'
      - '.project-spec/**'
      - 'docs/**'
      - '.github/workflows/deploy-bi.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/bi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/bi/package-lock.json

      - name: Install
        run: npm ci

      - name: Sync data
        run: npm run sync-data

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/bi
          command: pages deploy dist --project-name=mem-aivisdefect-bi
